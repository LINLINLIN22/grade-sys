<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成績系統(上傳CSV版本)</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial; padding: 10px; background-color: #333; color: #fff; margin: 0; }
  h2 { color: #fff; font-size: 1.5rem; }
  input[type="file"], input[type="text"] { display: inline-block; padding: 8px; margin: 5px 0; }
  .table-container { overflow-x: auto; margin: 10px 0; }
  table { border-collapse: collapse; width: 100%; min-width: 400px; }
  td, th { border: 1px solid #666; padding: 8px; text-align: center; background-color: #444; color: #fff; font-size: 0.9rem; }
  input { width: 60px; padding: 4px; background-color: #555; color: #fff; border: 1px solid #666; }
  button { background-color: #555; color: #fff; border: 1px solid #666; padding: 8px 12px; margin-top: 10px; cursor: pointer; font-size: 1rem; }
  button:hover { background-color: #666; }
  @media (max-width: 768px) {
    body { padding: 8px; }
    h2 { font-size: 1.2rem; }
    td, th { padding: 6px; font-size: 0.8rem; }
    input { width: 50px; padding: 3px; font-size: 0.9rem; }
    button { padding: 6px 10px; font-size: 0.9rem; }
  }
  @media (max-width: 480px) {
    body { padding: 5px; }
    h2 { font-size: 1rem; }
    td, th { padding: 4px; font-size: 0.7rem; }
    input { width: 40px; padding: 2px; font-size: 0.8rem; }
    button { padding: 5px 8px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<h2>📊 成績系統（CSV版）- 暗色主題</h2>

📂 上傳 CSV：<br>
<input type="file" id="fileInput" accept=".csv"><br><br>

🔍 搜尋：<br>
<input type="text" id="search" placeholder="搜尋..."><br><br>

<div class="table-container">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<br>
<button onclick="downloadCSV()">下載 CSV(grades.csv)</button>

<script>
let data = [];
let headers = [];

const tbody = document.getElementById("tbody");
const thead = document.getElementById("thead");

// 讀取 CSV
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    parseCSV(text);
  };

  reader.readAsText(file);
});

// 解析 CSV
function parseCSV(text) {
  const rows = text.split("\n").map(r => r.split(","));
  headers = rows[0];
  data = rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i] || "");
    return obj;
  });

  renderTable(data);
}

// 獲取顯示的欄位（排除"電子郵件信箱"）
function getDisplayHeaders() {
  return headers.filter(h => h !== "電子郵件信箱");
}

// 顯示表格
function renderTable(dataset) {
  thead.innerHTML = "";
  tbody.innerHTML = "";

  const displayHeaders = getDisplayHeaders();

  // 表頭
  const tr = document.createElement("tr");
  displayHeaders.forEach(h => {
    const th = document.createElement("th");
    th.innerText = h;
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  // 資料
  dataset.forEach((row, rowIndex) => {
    const tr = document.createElement("tr");

    displayHeaders.forEach(h => {
      const td = document.createElement("td");

      if (h === "姓名" || h === "代號" || h === "系級") {
        td.innerText = row[h];
      } else {
        const input = document.createElement("input");
        input.value = row[h];

        input.onchange = (e) => {
          row[h] = e.target.value;
        };

        td.appendChild(input);
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// 下載 CSV
function downloadCSV() {
  let csv = headers.join(",") + "\n";
  data.forEach(row => {
    csv += headers.map(h => row[h]).join(",") + "\n";
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "grades.csv";
  a.click();
}

// 搜尋功能
document.getElementById("search").addEventListener("input", function(e) {
  const query = e.target.value.toLowerCase();
  const filtered = data.filter(row =>
    Object.values(row).some(val => val.toLowerCase().includes(query))
  );
  renderTable(filtered);
});
</script>

</body>
</html>
